<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
<script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

<title>Team Picker for Intrams 2025–2026</title>

<style>
body {
    background: linear-gradient(135deg, #0b3c78, #1fa3a3);
    min-height: 100vh;
    margin: 0;
    font-family: Arial, sans-serif;
}

.navbar {
    background: linear-gradient(135deg, #0b3c78, #1fa3a3);
    padding: 12px 0;
}
.navbar-brand { font-weight: bold; font-size: 20px; }
.nav-link { color: #ffffff !important; transition: 0.3s; }
.nav-link:hover { color: #fbc02d !important; }
.nav-link.current { font-weight: bold; color: #fbc02d !important; }

.card {
    background-color: #ffffff;
    border-radius: 14px;
    border: 3px solid #0b3c78;
    box-shadow: 0 12px 28px rgba(11, 60, 120, 0.25);
}

.intrams-title span { margin: 0 4px; font-weight: 800; }
.red { color: #b71c1c; }
.yellow { color: #fbc02d; }
.green { color: #2e7d32; }
.blue { color: #1565c0; }

.hidden { display: none; }
.logo { width: 80px; }
.indented { margin-left: 30px; padding-left: 15px; border-left: 3px solid #ddd; }

button, .main-btn {
    width: 100%;
    padding: 12px;
    font-size: 16px;
    background: linear-gradient(45deg,#b71c1c,#fbc02d,#2e7d32,#1565c0);
    background-size: 400% 400%;
    color: #1c1c1c;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    animation: gradientMove 5s ease infinite;
    text-decoration: none;
    display: inline-block;
}
@keyframes gradientMove {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

.btn-toggle { min-width: 70px; font-size: 0.85rem; }
.multi-choice .btn-check + .btn { margin-right: 8px; margin-bottom: 6px; }
#image img { width: 220px; height: 220px; object-fit: contain; margin-top: 15px; }
</style>

<script>
function toggleDropdown(id, show) {
    const el = document.getElementById(id);
    if (show) el.classList.remove('hidden');
    else el.classList.add('hidden');
}
</script>

</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container">
        <a class="navbar-brand" href="account.html">OBMC Intramurals 25-26</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="account.html">Sign Up</a></li>
                <li class="nav-item"><a class="nav-link current" href="teampicker.html">Team Picker</a></li>
                <li class="nav-item"><a class="nav-link" href="members.html">Team Members</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="d-flex justify-content-center py-4">
    <div class="card p-4 w-50">

        <h2 class="text-center mb-4 intrams-title">
            <span class="red">Team Picker</span>
            <span class="yellow">for OBMC</span>
            <span class="green">Intrams</span>
            <span class="blue">2025–2026</span>
            <img src="ob.png" class="logo">
        </h2>

        <form>
            <div class="mb-3">
                <label class="form-label"><b>Are you done with the online registration?</b></label><br>
                <input type="radio" class="btn-check" name="registration" id="regYes"
                    onclick="toggleDropdown('sportsDiv', true);">
                <label class="btn btn-outline-success btn-toggle me-2" for="regYes">Yes</label>

                <input type="radio" class="btn-check" name="registration" id="regNo"
                    onclick="toggleDropdown('sportsDiv', false); toggleDropdown('philGamesDiv', false);
                             toggleDropdown('sportsSelectDiv', false); toggleDropdown('philSelectDiv', false);">
                <label class="btn btn-outline-danger btn-toggle" for="regNo">No</label>
            </div>

            <div id="sportsDiv" class="indented hidden mb-3">
                <label class="form-label"><b>Do you play sports?</b></label><br>
                <input type="radio" class="btn-check" name="sports" id="sportsYes"
                    onclick="toggleDropdown('sportsSelectDiv', true); toggleDropdown('philGamesDiv', false);">
                <label class="btn btn-outline-success btn-toggle me-2" for="sportsYes">Yes</label>

                <input type="radio" class="btn-check" name="sports" id="sportsNo"
                    onclick="toggleDropdown('sportsSelectDiv', false); toggleDropdown('philGamesDiv', true);">
                <label class="btn btn-outline-danger btn-toggle" for="sportsNo">No</label>
            </div>

            <div id="sportsSelectDiv" class="indented hidden mb-3">
                <label class="form-label"><b>Select your sports</b></label><br>
                <div class="multi-choice">
                    <input type="checkbox" class="btn-check" id="basketball">
                    <label class="btn btn-outline-primary btn-toggle" for="basketball">Basketball</label>

                    <input type="checkbox" class="btn-check" id="volleyball">
                    <label class="btn btn-outline-primary btn-toggle" for="volleyball">Volleyball</label>

                    <input type="checkbox" class="btn-check" id="badminton">
                    <label class="btn btn-outline-primary btn-toggle" for="badminton">Badminton</label>

                    <input type="checkbox" class="btn-check" id="chess">
                    <label class="btn btn-outline-primary btn-toggle" for="chess">Chess</label>
                </div>
            </div>

            <div id="philGamesDiv" class="indented hidden mb-3">
                <label class="form-label"><b>Do you want to play Philippine games?</b></label><br>
                <input type="radio" class="btn-check" name="philGames" id="philYes"
                    onclick="toggleDropdown('philSelectDiv', true);">
                <label class="btn btn-outline-success btn-toggle me-2" for="philYes">Yes</label>

                <input type="radio" class="btn-check" name="philGames" id="philNo"
                    onclick="toggleDropdown('philSelectDiv', false);">
                <label class="btn btn-outline-danger btn-toggle" for="philNo">No</label>
            </div>

            <div id="philSelectDiv" class="indented hidden mb-3">
                <label class="form-label"><b>Select Philippine games</b></label><br>
                <div class="multi-choice">
                    <input type="checkbox" class="btn-check" id="hilahang">
                    <label class="btn btn-outline-warning btn-toggle" for="hilahang">Hilahang Lupid</label>

                    <input type="checkbox" class="btn-check" id="hula">
                    <label class="btn btn-outline-warning btn-toggle" for="hula">Hula Hoop Relay</label>

                    <input type="checkbox" class="btn-check" id="kadang">
                    <label class="btn btn-outline-warning btn-toggle" for="kadang">Kadang Kadang</label>
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label"><b>Do you have medical clearance?</b></label><br>
                <input type="radio" class="btn-check" name="clearance" id="clearYes">
                <label class="btn btn-outline-success btn-toggle me-2" for="clearYes">Yes</label>

                <input type="radio" class="btn-check" name="clearance" id="clearNo">
                <label class="btn btn-outline-danger btn-toggle" for="clearNo">No</label>
            </div>

            <div class="mb-3">
                <label class="form-label"><b>What's your Grade & Section?</b></label>
                <select id="level" class="form-select mb-2">
                    <option value="">Enter Grade*</option>
                    <option value="7">7</option>
                    <option value="8">8</option>
                    <option value="9">9</option>
                    <option value="10">10</option>
                </select>
                <select id="section" class="form-select">
                    <option value="">Enter Section*</option>
                    <option value="emerald">Emerald</option>
                    <option value="ruby">Ruby</option>
                    <option value="sapphire">Sapphire</option>
                    <option value="topaz">Topaz</option>
                </select>
            </div>

            <div class="d-grid">
                <button type="button" py-click="intrams_checker">
                    Sign up
                </button>
            </div>
        </form>

        <center>
            <div id="output" class="mt-3"></div>
            <div id="image" class="mt-3"></div>
        </center>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<py-script src="main2.py"></py-script>

</body>
</html>
