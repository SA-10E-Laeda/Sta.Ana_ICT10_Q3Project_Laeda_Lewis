<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
<script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

<title>OBMC Account Maker</title>

<style>
    body {
        margin: 0;
        height: 100vh;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #0b3c78, #1fa3a3);
    }
    .navbar {
        background: linear-gradient(135deg, #0b3c78, #1fa3a3);
    }
    .navbar-brand {
        font-weight: bold;
        font-size: 20px;
    }
    .nav-link {
        transition: 0.3s;
        color: #ffffff !important;
    }
    .nav-link:hover {
        color: #fbc02d !important;
    }
    .main-container {
        display: flex;
        height: calc(100vh - 70px);
        gap: 40px;
        padding: 25px;
        box-sizing: border-box;
    }
    .left-section {
        flex: 2;
        position: relative;
        overflow: hidden;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        background: black;
    }
    .left-section img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        position: absolute;
        top: 0;
        left: 0;
        opacity: 0;
        transition: opacity 1s ease-in-out;
    }
    .left-section img.active {
        opacity: 1;
    }
    .right-section {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
    }
    .card {
        width: 100%;
        max-width: 350px;
        padding: 30px;
        border-radius: 20px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        background: white;
    }
    .logo {
        width: 90px;
    }
    h3 {
        font-weight: bold;
        color: #0b3c78;
    }
    .form-control {
        background-color: #e3f2fd;
        border: 2px solid #1565c0;
        transition: 0.3s;
    }
    .form-control:focus {
        background-color: white;
        border-color: #fbc02d;
        box-shadow: 0 0 8px rgba(251,192,45,0.6);
    }

    button.create-btn {
        background: linear-gradient(45deg,#b71c1c,#fbc02d,#2e7d32,#1565c0);
        background-size: 300% 300%;
        animation: gradientMove 5s ease infinite;
        border: none;
        color: #1c1c1c;
        font-weight: bold;
        border-radius: 8px;
        padding: 10px;
        width: 100%;
        cursor: pointer;
    }

    a.main-btn {
        background: linear-gradient(45deg,#b71c1c,#fbc02d,#2e7d32,#1565c0);
        background-size: 300% 300%;
        animation: gradientMove 5s ease infinite;
        color: #1c1c1c;
        font-weight: bold;
        border-radius: 8px;
        padding: 10px;
        display: inline-block;
        text-decoration: none;
        width: 100%;
        text-align: center;
    }

    @keyframes gradientMove {
        0% { background-position: 0% 50%; }
        50% { background-position: 100% 50%; }
        100% { background-position: 0% 50%; }
    }

    .hidden { display: none; }
</style>
</head>

<body>
<nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container">
        <a class="navbar-brand" href="#">OBMC Intramurals 25-26</a>
        <button class="navbar-toggler" type="button" 
                data-bs-toggle="collapse" 
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="#">Sign Up</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="teampicker.html">Team Picker</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="members.html">Team Members</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="main-container">

    <div class="left-section">
        <img src="red bulldogs.jpg" class="active">
        <img src="yellow tigers.jpg">
        <img src="green hornets.jpg">
        <img src="blue bears.jpg">
    </div>

    <div class="right-section">
        <div class="card text-center">
            <img src="ob.png" class="logo mb-3">
            <h3 class="mb-4">Create Account</h3>

            <form onsubmit="return false;">
                <div class="mb-3">
                    <input type="text" id="username" class="form-control" placeholder="Username">
                </div>
                <div class="mb-3">
                    <input type="password" id="password" class="form-control" placeholder="Password">
                </div>
                <div class="d-grid mb-2">
                    <button type="button" class="create-btn" py-click="account_creation">Create</button>
                </div>
            </form>

            <div id="output" class="mt-3"></div>

            <div id="teamBtnContainer" class="mt-3 hidden">
                <a href="teampicker.html" class="main-btn">Go to Team Picker</a>
            </div>
        </div>
    </div>
</div>

<script>
    let slides = document.querySelectorAll(".left-section img");
    let current = 0;
    function nextSlide() {
        slides[current].classList.remove("active");
        current = (current + 1) % slides.length;
        slides[current].classList.add("active");
    }
    setInterval(nextSlide, 4000);
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<py-config>
{
    "files": {
        "main.py": "main.py"
    }
}
</py-config>

<py-script src="main.py"></py-script>
</body>
</html>
