<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://pyscript.net/releases/2025.7.3/core.css">
    <script type="module" src="https://pyscript.net/releases/2025.7.3/core.js"></script>

    <title>Team List</title>

    <style>
        body {
            background: linear-gradient(135deg, #0b3c78, #1fa3a3);
            min-height: 100vh;
            margin: 0;
        }

        .navbar {
            background: linear-gradient(135deg, #0b3c78, #1fa3a3);
            padding: 12px 0;
        }

        .navbar-brand {
            font-weight: bold;
            font-size: 20px;
        }

        .nav-link {
            transition: 0.3s;
        }

        .nav-link:hover {
            color: #fbc02d !important;
        }

        .card {
            background-color: #ffffff;
            border-radius: 14px;
            border: 3px solid #0b3c78;
            box-shadow: 0 12px 28px rgba(11, 60, 120, 0.25);
        }

        /* MATCHING ANIMATED BUTTON */
        .main-btn {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            background: linear-gradient(45deg,#b71c1c,#fbc02d,#2e7d32,#1565c0);
            background-size: 400% 400%;
            color: #1c1c1c;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            animation: gradientMove 5s ease infinite;
            text-decoration: none;
            display: inline-block;
        }

        .main-btn:hover {
            opacity: 0.9;
            color: #1c1c1c;
        }

        @keyframes gradientMove {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark shadow">
    <div class="container">
        <a class="navbar-brand" href="account.html">
            OBMC Intramurals 25-26
        </a>

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse"
                data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item">
                    <a class="nav-link active" href="account.html">Sign Up</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="teampicker.html">Team Picker</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="#">Team Members</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="d-flex justify-content-center py-5">
    <div class="card p-4 w-50 text-center">

        <h2 id="teamTitle" class="mb-4"></h2>

        <div id="playerList" class="list-group"></div>

        <a href="teampicker.html" class="main-btn mt-4">
            ← Back to Team Picker
        </a>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<py-script src="main3.py"></py-script>

</body>
</html>
